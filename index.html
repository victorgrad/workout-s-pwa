<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- viewport-fit=cover lets us use the safe-area insets on notched iPhones.
       maximum-scale=1 + user-scalable=no disable zoom (honored in installed PWA). -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0e0f13" />

  <title>Workout</title>

  <!-- iOS installable / standalone -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" />
  <meta name="apple-mobile-web-app-title" content="Workout" />

  <!-- icons -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <main id="view"><!-- screens render here --></main>
    <nav id="tabbar">
      <button class="tab" data-tab="live"><span class="tab-ico">🏋️</span><span class="tab-label">Workout</span></button>
      <button class="tab" data-tab="progress"><span class="tab-ico">📈</span><span class="tab-label">Progress</span></button>
      <button class="tab" data-tab="edit"><span class="tab-ico">✏️</span><span class="tab-label">Edit</span></button>
    </nav>
  </div>

  <!-- classic scripts, loaded in order, communicating via globals -->
  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
